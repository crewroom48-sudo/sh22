workflows:
  android-apk:
    name: Android APK Direct Build

    environment:
      node: latest

    cache:
      cache_paths:
        - ~/.npm

    scripts:
      - rm -rf node_modules
      - rm -f package-lock.json

      - npm install

      # vygeneruje android priečinok z Expo projektu
      - npx expo prebuild --platform android

      # build APK priamo cez Gradle
      - cd android
      - ./gradlew assembleRelease

    artifacts:
      - android/app/build/outputs/apk/release/*.apk
